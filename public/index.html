<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistem Posyandu Lansia</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #2c3e50, #27ae60);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 30px;
        border-radius: 15px;
        background: white;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      .btn-login {
        background: #27ae60;
        color: white;
        border: none;
      }
      .btn-login:hover {
        background: #219150;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <!-- Gunakan placeholder atau logo posyandu jika ada -->
        <img src="https://via.placeholder.com/80" alt="Logo" class="mb-2" />
        <h4 class="fw-bold">Posyandu Lansia</h4>
        <p class="text-muted">Silakan masuk ke sistem</p>
      </div>

      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="admin"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <div
          id="errorMessage"
          class="text-danger small mb-3"
          style="display: none"
        >
          Username atau password salah!
        </div>
        <button type="submit" class="btn btn-login w-100 py-2 fw-bold">
          MASUK
        </button>
      </form>

      <div class="text-center mt-4">
        <small class="text-muted">&copy; 2026 Sistem Informasi Posyandu</small>
      </div>
    </div>

    <script>
      document
        .getElementById("formLogin")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const errorMsg = document.getElementById("errorMessage");

          // Verifikasi login sederhana
          if (user === "admin" && pass === "admin123") {
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("adminName", "Ammar");

            // DISESUAIKAN: Mengarah ke rute /dashboard (server.js akan mengambil pages/dashboard.html)
            window.location.href = "/dashboard";
          } else {
            errorMsg.style.display = "block";
          }
        });

      // Cek status login saat halaman dimuat
      if (sessionStorage.getItem("isLoggedIn") === "true") {
        window.location.href = "/dashboard";
      }
    </script>
  </body>
</html>
