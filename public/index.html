<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f2f5;
        font-family: "Poppins", sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-container {
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        max-width: 900px;
        width: 100%;
      }
      .branding-side {
        background-color: #f8f9fa;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .logo-box img {
        width: 80px;
        margin-bottom: 15px;
      }
      .brand-title {
        color: #0f3d2e;
        font-weight: 800;
        font-size: 2.5rem;
        margin-bottom: 5px;
      }
      .brand-subtitle {
        color: #1a5c41;
        font-weight: 600;
        font-size: 1.1rem;
      }
      .illustration img {
        width: 100%;
        max-width: 300px;
        margin-top: 30px;
      }
      .form-side {
        padding: 60px;
      }
      .form-side h2 {
        font-weight: 700;
        margin-bottom: 30px;
      }
      .form-label {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .form-control {
        background-color: #e9ecef;
        border: none;
        padding: 12px;
        border-radius: 8px;
      }
      .btn-login {
        background-color: #0d1137;
        color: white;
        border-radius: 30px;
        padding: 12px;
        font-weight: 600;
        margin-top: 20px;
        transition: 0.3s;
      }
      .btn-login:hover {
        background-color: #1a226b;
        color: white;
      }
      .extra-links {
        font-size: 0.85rem;
        margin-top: 15px;
      }
      .error-msg {
        display: none;
        color: #dc3545;
        font-size: 0.85rem;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="row g-0">
        <!-- Sisi Kiri: Branding -->
        <div class="col-md-6 branding-side">
          <div class="logo-box"></div>
          <h1 class="brand-title">SIPOLTA</h1>
          <p class="brand-subtitle">Sistem Informasi Posyandu Balita</p>
          <div class="illustration">
            <!-- Ganti dengan path gambar ilustrasi keluarga/anak jika ada -->
            <img src="assets/img/balita.webp" alt="Ilustrasi" />
          </div>
        </div>

        <!-- Sisi Kanan: Form -->
        <div class="col-md-6 form-side">
          <h2>Login</h2>
          <form id="formLogin">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Masukkan Username"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Masukkan Password"
                required
              />
            </div>

            <div class="d-flex justify-content-between extra-links">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                />
                <label class="form-check-label" for="rememberMe"
                  >Remember Me</label
                >
              </div>
              <a href="#" class="text-decoration-none text-muted"
                >Forgot Password?</a
              >
            </div>

            <div id="errorMessage" class="error-msg">
              Username atau password salah!
            </div>

            <button type="submit" class="btn btn-login w-100">Login</button>

            <div class="text-center mt-3 extra-links">
              <span class="text-muted">Or sign up</span>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("formLogin")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const errorMsg = document.getElementById("errorMessage");

          if (user === "admin" && pass === "admin123") {
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("adminName", "Ammar");
            window.location.href = "/dashboard";
          } else {
            errorMsg.style.display = "block";
          }
        });

      if (sessionStorage.getItem("isLoggedIn") === "true") {
        window.location.href = "/dashboard";
      }
    </script>
  </body>
</html>
