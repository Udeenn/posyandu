<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard" class="active">Beranda</a>
      <a href="/data-balita">Data Balita</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <div class="main-content">
      <header>
        <span>SIPOLTA - Sistem Informasi Posyandu Balita</span>
        <span>Admin: <strong>Ammar</strong></span>
      </header>

      <div class="row mt-4">
        <div class="col-md-4">
          <div class="card bg-primary text-white p-3 mb-3">
            <h5>Total Balita</h5>
            <h2 id="totalBalita">0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-success text-white p-3 mb-3">
            <h5>Total Kunjungan</h5>
            <h2 id="totalKunjungan">0</h2>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-info text-white p-3 mb-3">
            <h5>Total Pemeriksaan</h5>
            <h2 id="totalPeriksa">0</h2>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      async function loadStats() {
        const [balita, kunjungan, periksa] = await Promise.all([
          fetch("/api/balita").then((r) => r.json()),
          fetch("/api/kunjungan").then((r) => r.json()),
          fetch("/api/pemeriksaan").then((r) => r.json()),
        ]);
        document.getElementById("totalBalita").innerText = balita.length;
        document.getElementById("totalKunjungan").innerText = kunjungan.length;
        document.getElementById("totalPeriksa").innerText = periksa.length;
      }
      loadStats();
    </script>
  </body>
</html>
