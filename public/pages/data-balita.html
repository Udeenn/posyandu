<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Data Balita - SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard">Beranda</a>
      <a href="/data-balita" class="active">Data Balita</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <div class="main-content">
      <header>
        <span>SIPOLTA - Sistem Informasi Posyandu Balita</span>
        <span>Admin: <strong>Ammar</strong></span>
      </header>

      <h3 class="mt-4">Data Balita</h3>
      <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalBalita"
      >
        Tambah Balita
      </button>

      <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>Nama</th>
            <th>JK</th>
            <!-- Tambahan Header Jenis Kelamin -->
            <th>Tgl Lahir</th>
            <th>Nama Orang Tua</th>
            <th>Alamat</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelBalita"></tbody>
      </table>
    </div>

    <!-- Modal Tambah Balita -->
    <div class="modal fade" id="modalBalita" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="formBalita">
            <div class="modal-header">
              <h5 class="modal-title">Tambah Data Balita</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">Nama Balita</label>
                <input
                  type="text"
                  id="nama"
                  class="form-control"
                  placeholder="Nama Lengkap"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Jenis Kelamin</label>
                <select id="jenisKelamin" class="form-select" required>
                  <option value="" disabled selected>
                    -- Pilih Jenis Kelamin --
                  </option>
                  <option value="Laki-laki">Laki-laki</option>
                  <option value="Perempuan">Perempuan</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Tanggal Lahir</label>
                <input
                  type="date"
                  id="tglLahir"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Nama Orang Tua</label>
                <input
                  type="text"
                  id="ortu"
                  class="form-control"
                  placeholder="Contoh: Budi/Siti"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Alamat</label>
                <textarea id="alamat" class="form-control" rows="2"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Batal
              </button>
              <button type="submit" class="btn btn-primary">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>

    <script>
      // Fungsi untuk memuat data ke tabel
      async function loadBalita() {
        try {
          const response = await fetch("/api/balita");
          const data = await response.json();
          const tbody = document.getElementById("tabelBalita");

          tbody.innerHTML = data
            .map(
              (b) => `
            <tr>
              <td>${b.nama}</td>
              <td>${b.jenis_kelamin || "-"}</td>
              <td>${b.tanggal_lahir}</td>
              <td>${b.nama_ortu}</td>
              <td>${b.alamat || "-"}</td>
              <td>
                <button class="btn btn-danger btn-sm" onclick="hapusData('balita', ${b.id})">Hapus</button>
              </td>
            </tr>
          `,
            )
            .join("");
        } catch (error) {
          console.error("Gagal memuat data:", error);
        }
      }

      // Handler Form Tambah Balita
      document
        .getElementById("formBalita")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const dataBaru = {
            nama: document.getElementById("nama").value,
            tanggal_lahir: document.getElementById("tglLahir").value,
            jenis_kelamin: document.getElementById("jenisKelamin").value,
            nama_ortu: document.getElementById("ortu").value,
            alamat: document.getElementById("alamat").value,
            tanggal_daftar: new Date().toISOString().split("T")[0],
          };

          simpanData("balita", dataBaru);
        });

      // Jalankan fungsi muat data saat halaman dibuka
      loadBalita();
    </script>
  </body>
</html>
