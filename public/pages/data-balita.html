<!doctype html>
<html lang="id">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard" class="active">Beranda</a>
      <a href="/data-balita">Data Balita</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <!-- Sidebar Sama -->
    <div class="main-content">
      <header>
        <span>SIPOLTA - Sistem Informasi Posyandu Balita</span>
        <span>Admin: <strong>Ammar</strong></span>
      </header>
      <h3>Data Balita</h3>
      <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalBalita"
      >
        Tambah Balita
      </button>
      <table class="table table-bordered bg-white">
        <thead class="table-dark">
          <tr>
            <th>Nama</th>
            <th>Tgl Lahir</th>
            <th>Ortu</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelBalita"></tbody>
      </table>
    </div>

    <div class="modal fade" id="modalBalita" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="formBalita">
            <div class="modal-body">
              <div class="mb-3">
                <label>Nama Balita</label
                ><input type="text" id="nama" class="form-control" required />
              </div>
              <div class="mb-3">
                <label>Tanggal Lahir</label
                ><input
                  type="date"
                  id="tglLahir"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label>Nama Orang Tua</label
                ><input type="text" id="ortu" class="form-control" required />
              </div>
              <div class="mb-3">
                <label>Alamat</label
                ><textarea id="alamat" class="form-control"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      async function loadBalita() {
        const data = await fetch("/api/balita").then((r) => r.json());
        document.getElementById("tabelBalita").innerHTML = data
          .map(
            (b) => `
                <tr>
                    <td>${b.nama}</td>
                    <td>${b.tanggal_lahir}</td>
                    <td>${b.nama_ortu}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="hapusData('balita', ${b.id})">Hapus</button></td>
                </tr>`,
          )
          .join("");
      }
      document.getElementById("formBalita").addEventListener("submit", (e) => {
        e.preventDefault();
        simpanData("balita", {
          nama: document.getElementById("nama").value,
          tanggal_lahir: document.getElementById("tglLahir").value,
          nama_ortu: document.getElementById("ortu").value,
          alamat: document.getElementById("alamat").value,
        });
      });
      loadBalita();
    </script>
  </body>
</html>
