<!doctype html>
<html lang="id">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <a href="/dashboard">Beranda</a>
      <a href="/data-lansia">Data Lansia</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
    </div>

    <div class="main-content">
      <header>
        <img
          src="../assets/img/posyandu.png"
          style="width: 40px; height: 40px"
          alt="Logo"
        />
        <span>Admin: <strong>Ammar</strong></span>
      </header>

      <h3>Data Lansia</h3>
      <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalLansia"
      >
        Tambah Lansia
      </button>

      <table class="table table-bordered bg-white">
        <thead class="table-dark">
          <tr>
            <th>Nama</th>
            <th>Umur</th>
            <th>Alamat</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelLansia">
          <!-- Data akan diisi oleh JavaScript -->
        </tbody>
      </table>
    </div>

    <div class="modal fade" id="modalLansia" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Tambah Data Lansia</h5>
            <button
              type="button"
              `
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formLansia">
              <div class="mb-3">
                <label>Nama Lengkap</label>
                <input type="text" id="nama" class="form-control" required />
              </div>
              <div class="mb-3">
                <label>Umur</label>
                <input type="number" id="umur" class="form-control" required />
              </div>
              <div class="mb-3">
                <label>Alamat</label>
                <textarea id="alamat" class="form-control" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Simpan Data</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script>
      // Logika kirim form
      document
        .getElementById("formLansia")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const data = {
            nama: document.getElementById("nama").value,
            umur: document.getElementById("umur").value,
            alamat: document.getElementById("alamat").value,
            tanggal_daftar: new Date().toISOString().split("T")[0], // Format YYYY-MM-DD
          };
          simpanData("lansia", data);
        });
    </script>

    <!-- Script Native JS untuk ambil data -->
    <script>
      async function loadLansia() {
        const response = await fetch("/api/lansia");
        const data = await response.json();
        const tbody = document.getElementById("tabelLansia");
        tbody.innerHTML = data
          .map(
            (item) => `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.umur} thn</td>
                    <td>${item.alamat}</td>
                    <td>
                      <button class="btn btn-sm btn-danger" onclick="hapusData('lansia', ${item.id})">
                          Hapus
                      </button>
                    </td>
                </tr>
            `,
          )
          .join("");
      }
      loadLansia();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
