<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kunjungan SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard">Beranda</a>
      <a href="/data-balita">Data Balita</a>
      <a href="/kunjungan" class="active">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <div class="main-content">
      <header>
        <span>SIPOLTA - Sistem Informasi Posyandu Balita</span>
        <span>Admin: <strong>Ammar</strong></span>
      </header>

      <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
        <h3>Data Kunjungan Balita</h3>
        <!-- Tombol ini butuh Bootstrap JS agar bisa terbuka -->
        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#modalKunjungan"
        >
          Tambah Kunjungan
        </button>
      </div>

      <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
          <tr>
            <th>Tanggal</th>
            <th>Nama Balita</th>
            <th>Tujuan / Keluhan</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelKunjungan"></tbody>
      </table>
    </div>

    <!-- Modal Kunjungan -->
    <div class="modal fade" id="modalKunjungan" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="formKunjungan">
            <div class="modal-header">
              <h5 class="modal-title">Input Kunjungan</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">Pilih Balita</label>
                <select id="selectBalita" class="form-select" required></select>
              </div>
              <div class="mb-3">
                <label class="form-label">Tanggal Kunjungan</label>
                <input
                  type="date"
                  id="tglKunjungan"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Tujuan</label>
                <textarea
                  id="tujuan"
                  class="form-control"
                  placeholder="Contoh: Imunisasi Campak"
                  required
                ></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Batal
              </button>
              <button type="submit" class="btn btn-primary">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- WAJIB: Bootstrap JS Bundle untuk fungsionalitas Modal -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
      async function loadKunjunganPage() {
        try {
          const [balita, kunjungan] = await Promise.all([
            fetch("/api/balita").then((r) => r.json()),
            fetch("/api/kunjungan").then((r) => r.json()),
          ]);

          const selectBalita = document.getElementById("selectBalita");
          selectBalita.innerHTML =
            '<option value="" disabled selected>-- Pilih Balita --</option>' +
            balita
              .map((b) => `<option value="${b.id}">${b.nama}</option>`)
              .join("");

          const tbody = document.getElementById("tabelKunjungan");
          tbody.innerHTML = kunjungan
            .map((k) => {
              const b = balita.find((x) => x.id == k.balita_id);
              return `<tr>
                      <td>${k.tanggal_kunjungan}</td>
                      <td>${b ? b.nama : "Tidak diketahui"}</td>
                      <td>${k.tujuan}</td>
                      <td><button class="btn btn-danger btn-sm" onclick="hapusData('kunjungan', ${k.id})">Hapus</button></td>
                  </tr>`;
            })
            .join("");
        } catch (error) {
          console.error("Gagal memuat data:", error);
        }
      }

      document
        .getElementById("formKunjungan")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          simpanData("kunjungan", {
            balita_id: document.getElementById("selectBalita").value,
            tanggal_kunjungan: document.getElementById("tglKunjungan").value,
            tujuan: document.getElementById("tujuan").value,
          });
        });

      loadKunjunganPage();
    </script>
  </body>
</html>
