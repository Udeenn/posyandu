<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kunjungan Lansia - Posyandu</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <a href="/dashboard">Beranda</a>
      <a href="/data-lansia">Data Lansia</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Keluar (Logout)</a>
    </div>

    <div class="main-content">
      <header>
        <img
          src="../assets/img/posyandu.png"
          style="width: 40px; height: 40px"
          alt="Logo"
        />
        <span>Admin: <strong>Ammar</strong></span>
      </header>

      <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3>Data Kunjungan Lansia</h3>
          <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#modalKunjungan"
          >
            Tambah Kunjungan
          </button>
        </div>

        <table class="table table-bordered bg-white shadow-sm">
          <thead class="table-dark">
            <tr>
              <th>Tanggal</th>
              <th>Nama Lansia</th>
              <th>Tujuan Kunjungan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelKunjungan">
            <!-- Data diisi oleh JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal Tambah Kunjungan -->
    <div class="modal fade" id="modalKunjungan" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Form Tambah Kunjungan</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formKunjungan">
              <div class="mb-3">
                <label>Pilih Lansia</label>
                <select id="selectLansia" class="form-select" required>
                  <option value="">-- Pilih Nama Lansia --</option>
                </select>
              </div>
              <div class="mb-3">
                <label>Tanggal Kunjungan</label>
                <input
                  type="date"
                  id="tglKunjungan"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label>Tujuan / Keluhan</label>
                <textarea
                  id="tujuan"
                  class="form-control"
                  placeholder="Contoh: Cek rutin atau pusing"
                  required
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Simpan Kunjungan
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script>
      // 1. Load data lansia untuk Dropdown
      async function loadLansiaToSelect() {
        const res = await fetch("/api/lansia");
        const data = await res.json();
        const select = document.getElementById("selectLansia");

        data.forEach((l) => {
          const opt = document.createElement("option");
          opt.value = l.id;
          opt.text = l.nama;
          opt.dataset.nama = l.nama; // Simpan nama untuk disimpan ke kunjungan
          select.appendChild(opt);
        });
      }

      // 2. Load data tabel kunjungan
      async function loadKunjungan() {
        const res = await fetch("/api/kunjungan");
        const data = await res.json();
        const tbody = document.getElementById("tabelKunjungan");

        tbody.innerHTML = data
          .map(
            (k) => `
                <tr>
                    <td>${k.tanggal_kunjungan}</td>
                    <td>${k.nama_lansia}</td>
                    <td>${k.tujuan}</td>
                    <td>
                      <button class="btn btn-sm btn-danger" onclick="hapusData('kunjungan', ${k.id})">
                          Hapus
                      </button>
                    </td>
                </tr>
            `,
          )
          .join("");
      }

      // 3. Handle Submit Form
      document
        .getElementById("formKunjungan")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const selectEl = document.getElementById("selectLansia");
          const selectedOption = selectEl.options[selectEl.selectedIndex];

          const data = {
            lansia_id: selectEl.value,
            nama_lansia: selectedOption.text,
            tanggal_kunjungan: document.getElementById("tglKunjungan").value,
            tujuan: document.getElementById("tujuan").value,
          };

          simpanData("kunjungan", data);
        });

      // Jalankan fungsi saat page dibuka
      loadLansiaToSelect();
      loadKunjungan();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
