<!doctype html>
<html lang="id">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      @media print {
        .sidebar,
        .btn,
        header {
          display: none;
        }
        .main-content {
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <a href="/dashboard">Beranda</a>
      <a href="/data-lansia">Data Lansia</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
    </div>
    <div class="main-content">
      <div class="d-flex justify-content-between">
        <h3>Laporan Posyandu Lansia</h3>
        <button class="btn btn-dark" onclick="window.print()">Cetak PDF</button>
      </div>
      <hr />
      <div id="kontenLaporan" class="bg-white p-4 shadow-sm">
        <h5>Rekapitulasi Kunjungan & Kesehatan</h5>
        <table class="table table-striped mt-3">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nama Lansia</th>
              <th>Tensi</th>
              <th>Gula Darah</th>
              <th>Saran</th>
            </tr>
          </thead>
          <tbody id="tabelLaporan"></tbody>
        </table>
      </div>
    </div>

    <script>
      async function loadLaporan() {
        const [resP, resL] = await Promise.all([
          fetch("/api/pemeriksaan"),
          fetch("/api/lansia"),
        ]);
        const pemeriksaan = await resP.json();
        const lansia = await resL.json();

        const tbody = document.getElementById("tabelLaporan");
        tbody.innerHTML = pemeriksaan
          .map((p) => {
            const l = lansia.find((item) => item.id == p.lansia_id);
            return `
                    <tr>
                        <td>${p.tanggal}</td>
                        <td>${l ? l.nama : "Unknown"}</td>
                        <td>${p.tensi_darah}</td>
                        <td>${p.gula_darah}</td>
                        <td>${p.catatan}</td>
                    </tr>`;
          })
          .join("");
      }
      loadLaporan();
    </script>
  </body>
</html>
