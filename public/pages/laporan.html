<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Laporan SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      /* Sembunyikan elemen non-laporan saat print */
      @media print {
        .sidebar,
        .btn,
        header,
        hr {
          display: none !important;
        }
        .main-content {
          margin: 0;
          padding: 0;
          width: 100%;
        }
        .table {
          border: 1px solid #000 !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard" class="active">Beranda</a>
      <a href="/data-balita">Data Balita</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <!-- Sidebar Sama -->

    <div class="main-content">
      <header>
        <span>SIPOLTA - Laporan Bulanan</span>
        <button class="btn btn-dark btn-sm" onclick="window.print()">
          Cetak Laporan (PDF)
        </button>
      </header>

      <div class="container-fluid mt-4">
        <div class="text-center mb-4">
          <h2>REKAPITULASI PEMERIKSAAN BALITA</h2>
          <p>Sistem Informasi Posyandu Balita (SIPOLTA)</p>
        </div>

        <table class="table table-bordered table-striped">
          <thead class="table-secondary">
            <tr>
              <th>Tgl Periksa</th>
              <th>Nama Balita</th>
              <th>BB/TB/LK</th>
              <th>KPSP</th>
              <th>TDL/TDD</th>
              <th>KMPE</th>
              <th>Catatan</th>
            </tr>
          </thead>
          <tbody id="tabelLaporan"></tbody>
        </table>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      async function generateReport() {
        const [balita, pemeriksaan] = await Promise.all([
          fetch("/api/balita").then((r) => r.json()),
          fetch("/api/pemeriksaan").then((r) => r.json()),
        ]);

        const tbody = document.getElementById("tabelLaporan");
        tbody.innerHTML = pemeriksaan
          .map((p) => {
            const b = balita.find((x) => x.id == p.balita_id);
            return `<tr>
                    <td>${p.tanggal}</td>
                    <td>${b ? b.nama : "-"}</td>
                    <td>${p.berat_badan}kg / ${p.tinggi_badan}cm / ${p.lingkar_kepala}cm</td>
                    <td>${p.kpsp}</td>
                    <td>${p.tdl} / ${p.tdd}</td>
                    <td>${p.kmpe || "-"}</td>
                    <td>${p.catatan || "-"}</td>
                </tr>`;
          })
          .join("");
      }
      generateReport();
    </script>
  </body>
</html>
