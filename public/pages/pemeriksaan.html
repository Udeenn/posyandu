<!doctype html>
<html lang="id">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard" class="active">Beranda</a>
      <a href="/data-balita">Data Balita</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <div class="main-content">
      <h3>Pemeriksaan Balita</h3>
      <button
        class="btn btn-success mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalPeriksa"
      >
        Input Pemeriksaan
      </button>
      <table class="table table-bordered bg-white">
        <thead class="table-success">
          <tr>
            <th>Tgl</th>
            <th>Nama</th>
            <th>BB/TB/LK</th>
            <th>KPSP/TDL/TDD</th>
            <th>KMPE</th>
          </tr>
        </thead>
        <tbody id="tabelPeriksa"></tbody>
      </table>
    </div>

    <div class="modal fade" id="modalPeriksa" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form id="formPeriksa">
            <div class="modal-body">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Pilih Balita</label
                  ><select
                    id="selectBalita"
                    class="form-select"
                    required
                  ></select>
                </div>
                <div class="col-md-6 mb-3">
                  <label>Tanggal</label
                  ><input type="date" id="tgl" class="form-control" required />
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label>BB (kg)</label
                  ><input
                    type="number"
                    step="0.1"
                    id="bb"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3">
                  <label>TB (cm)</label
                  ><input
                    type="number"
                    step="0.1"
                    id="tb"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3">
                  <label>LK (cm)</label
                  ><input
                    type="number"
                    step="0.1"
                    id="lk"
                    class="form-control"
                    required
                  />
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label>KPSP</label
                  ><select id="kpsp" class="form-select">
                    <option>Sesuai</option>
                    <option>Meragukan</option>
                    <option>Penyimpangan</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <label>TDL</label
                  ><select id="tdl" class="form-select">
                    <option>Normal</option>
                    <option>Gangguan</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <label>TDD</label
                  ><select id="tdd" class="form-select">
                    <option>Normal</option>
                    <option>Gangguan</option>
                  </select>
                </div>
              </div>
              <div class="mb-3">
                <label>KMPE</label
                ><textarea
                  id="kmpe"
                  class="form-control"
                  placeholder="Hasil KMPE"
                ></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-success">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      async function initPage() {
        const balita = await fetch("/api/balita").then((r) => r.json());
        const periksa = await fetch("/api/pemeriksaan").then((r) => r.json());

        document.getElementById("selectBalita").innerHTML = balita
          .map((b) => `<option value="${b.id}">${b.nama}</option>`)
          .join("");
        document.getElementById("tabelPeriksa").innerHTML = periksa
          .map((p) => {
            const b = balita.find((x) => x.id == p.balita_id);
            return `<tr>
                    <td>${p.tanggal}</td>
                    <td>${b ? b.nama : "Unknown"}</td>
                    <td>${p.berat_badan}/${p.tinggi_badan}/${p.lingkar_kepala}</td>
                    <td>${p.kpsp}/${p.tdl}/${p.tdd}</td>
                    <td>${p.kmpe}</td>
                </tr>`;
          })
          .join("");
      }
      document.getElementById("formPeriksa").addEventListener("submit", (e) => {
        e.preventDefault();
        simpanData("pemeriksaan", {
          balita_id: document.getElementById("selectBalita").value,
          tanggal: document.getElementById("tgl").value,
          berat_badan: document.getElementById("bb").value,
          tinggi_badan: document.getElementById("tb").value,
          lingkar_kepala: document.getElementById("lk").value,
          kpsp: document.getElementById("kpsp").value,
          tdl: document.getElementById("tdl").value,
          tdd: document.getElementById("tdd").value,
          kmpe: document.getElementById("kmpe").value,
        });
      });
      initPage();
    </script>
  </body>
</html>
