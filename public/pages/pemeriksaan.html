<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pemeriksaan Balita - SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center">SIPOLTA</h4>
      <hr />
      <a href="/dashboard">Beranda</a>
      <a href="/data-balita">Data Balita</a>
      <a href="/kunjungan">Kunjungan</a>
      <a href="/pemeriksaan" class="active">Pemeriksaan</a>
      <a href="/laporan">Laporan</a>
      <hr />
      <a href="#" id="btnLogout" class="text-danger">Logout</a>
    </div>

    <div class="main-content">
      <!-- Header disesuaikan dengan data-balita.html -->
      <header>
        <span>SIPOLTA - Sistem Informasi Posyandu Balita</span>
        <span>Admin: <strong>Ammar</strong></span>
      </header>

      <h3 class="mt-4">Pemeriksaan Balita</h3>
      <button
        class="btn btn-success mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalPeriksa"
      >
        Input Pemeriksaan
      </button>

      <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-success">
          <tr>
            <th>Tgl</th>
            <th>Nama</th>
            <th>BB/TB/LK</th>
            <th>KPSP/TDL/TDD</th>
            <th>KMPE</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelPeriksa"></tbody>
      </table>
    </div>

    <!-- Modal Input Pemeriksaan -->
    <div class="modal fade" id="modalPeriksa" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <form id="formPeriksa">
            <div class="modal-header">
              <h5 class="modal-title">Form Input Pemeriksaan</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Pilih Balita</label>
                  <select
                    id="selectBalita"
                    class="form-select"
                    required
                  ></select>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Tanggal</label>
                  <input type="date" id="tgl" class="form-control" required />
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">BB (kg)</label>
                  <input
                    type="number"
                    step="0.1"
                    id="bb"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">TB (cm)</label>
                  <input
                    type="number"
                    step="0.1"
                    id="tb"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">LK (cm)</label>
                  <input
                    type="number"
                    step="0.1"
                    id="lk"
                    class="form-control"
                    required
                  />
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">KPSP</label>
                  <select id="kpsp" class="form-select">
                    <option>Sesuai</option>
                    <option>Meragukan</option>
                    <option>Penyimpangan</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">TDL</label>
                  <select id="tdl" class="form-select">
                    <option>Normal</option>
                    <option>Gangguan</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">TDD</label>
                  <select id="tdd" class="form-select">
                    <option>Normal</option>
                    <option>Gangguan</option>
                  </select>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">KMPE</label>
                <textarea
                  id="kmpe"
                  class="form-control"
                  placeholder="Hasil KMPE"
                ></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Batal
              </button>
              <button type="submit" class="btn btn-success">Simpan</button>
            </div>

            <!-- edit -->
            <input type="hidden" id="editId" value="" />
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
      async function initPage() {
        const balita = await fetch("/api/balita").then((r) => r.json());
        const periksa = await fetch("/api/pemeriksaan").then((r) => r.json());

        document.getElementById("selectBalita").innerHTML = balita
          .map((b) => `<option value="${b.id}">${b.nama}</option>`)
          .join("");

        document.getElementById("tabelPeriksa").innerHTML = periksa
          .map((p) => {
            const b = balita.find((x) => x.id == p.balita_id);
            return `<tr>
                    <td>${p.tanggal}</td>
                    <td>${b ? b.nama : "Unknown"}</td>
                    <td>${p.berat_badan}/${p.tinggi_badan}/${p.lingkar_kepala}</td>
                    <td>${p.kpsp}/${p.tdl}/${p.tdd}</td>
                    <td>${p.kmpe}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="hapusData('pemeriksaan', ${p.id})">Hapus</button>
                    </td>
                </tr>`;
          })
          .join("");
      }

      document.getElementById("formPeriksa").addEventListener("submit", (e) => {
        e.preventDefault();
        simpanData("pemeriksaan", {
          balita_id: document.getElementById("selectBalita").value,
          tanggal: document.getElementById("tgl").value,
          berat_badan: document.getElementById("bb").value,
          tinggi_badan: document.getElementById("tb").value,
          lingkar_kepala: document.getElementById("lk").value,
          kpsp: document.getElementById("kpsp").value,
          tdl: document.getElementById("tdl").value,
          tdd: document.getElementById("tdd").value,
          kmpe: document.getElementById("kmpe").value,
        });
      });
      initPage();
    </script>
    <script>
      let isEditMode = false;

      async function initPage() {
        const balita = await fetch("/api/balita").then((r) => r.json());
        const periksa = await fetch("/api/pemeriksaan").then((r) => r.json());

        document.getElementById("selectBalita").innerHTML = balita
          .map((b) => `<option value="${b.id}">${b.nama}</option>`)
          .join("");

        document.getElementById("tabelPeriksa").innerHTML = periksa
          .map((p) => {
            const b = balita.find((x) => x.id == p.balita_id);
            // Stringify data untuk dikirim ke fungsi edit
            const dataJson = JSON.stringify(p).replace(/"/g, "&quot;");

            return `<tr>
                <td>${p.tanggal}</td>
                <td>${b ? b.nama : "Unknown"}</td>
                <td>${p.berat_badan}/${p.tinggi_badan}/${p.lingkar_kepala}</td>
                <td>${p.kpsp}/${p.tdl}/${p.tdd}</td>
                <td>${p.kmpe}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="editPemeriksaan('${dataJson}')">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="hapusData('pemeriksaan', ${p.id})">Hapus</button>
                </td>
            </tr>`;
          })
          .join("");
      }

      // Fungsi untuk mengisi form saat tombol Edit diklik
      function editPemeriksaan(dataString) {
        const p = JSON.parse(dataString);
        isEditMode = true;

        // Isi field form
        document.getElementById("editId").value = p.id;
        document.getElementById("selectBalita").value = p.balita_id;
        document.getElementById("tgl").value = p.tanggal;
        document.getElementById("bb").value = p.berat_badan;
        document.getElementById("tb").value = p.tinggi_badan;
        document.getElementById("lk").value = p.lingkar_kepala;
        document.getElementById("kpsp").value = p.kpsp;
        document.getElementById("tdl").value = p.tdl;
        document.getElementById("tdd").value = p.tdd;
        document.getElementById("kmpe").value = p.kmpe;

        // Ubah judul modal dan munculkan modal
        document.querySelector(".modal-title").innerText =
          "Edit Pemeriksaan Balita";
        new bootstrap.Modal(document.getElementById("modalPeriksa")).show();
      }

      // Reset form saat modal ditutup (agar kembali ke mode Tambah)
      document
        .getElementById("modalPeriksa")
        .addEventListener("hidden.bs.modal", function () {
          isEditMode = false;
          document.getElementById("formPeriksa").reset();
          document.getElementById("editId").value = "";
          document.querySelector(".modal-title").innerText =
            "Form Input Pemeriksaan";
        });

      document.getElementById("formPeriksa").addEventListener("submit", (e) => {
        e.preventDefault();

        const data = {
          balita_id: document.getElementById("selectBalita").value,
          tanggal: document.getElementById("tgl").value,
          berat_badan: document.getElementById("bb").value,
          tinggi_badan: document.getElementById("tb").value,
          lingkar_kepala: document.getElementById("lk").value,
          kpsp: document.getElementById("kpsp").value,
          tdl: document.getElementById("tdl").value,
          tdd: document.getElementById("tdd").value,
          kmpe: document.getElementById("kmpe").value,
        };

        const id = document.getElementById("editId").value;

        if (isEditMode) {
          updateData("pemeriksaan", id, data);
        } else {
          simpanData("pemeriksaan", data);
        }
      });

      initPage();
    </script>
  </body>
</html>
