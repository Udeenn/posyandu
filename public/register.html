<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - SIPOLTA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f2f5;
        font-family: "Poppins", sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .illustration img {
        width: 100%;
        max-width: 300px;
        margin-top: 30px;
      }
      .login-container {
        background: #ffffff;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        max-width: 900px;
        width: 100%;
      }
      .branding-side {
        background-color: #f8f9fa;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .brand-title {
        color: #0f3d2e;
        font-weight: 800;
        font-size: 2.5rem;
      }
      .form-side {
        padding: 60px;
      }
      .btn-register {
        background-color: #27ae60;
        color: white;
        border-radius: 30px;
        padding: 12px;
        font-weight: 600;
        transition: 0.3s;
        border: none;
      }
      .btn-register:hover {
        background-color: #219150;
        color: white;
      }
      .form-control {
        background-color: #e9ecef;
        border: none;
        padding: 12px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="row g-0">
        <div class="col-md-6 branding-side">
          <h1 class="brand-title">SIPOLTA</h1>
          <p class="fw-bold" style="color: #1a5c41">Daftar Akun Admin Baru</p>
          <div class="illustration">
            <!-- Ganti dengan path gambar ilustrasi keluarga/anak jika ada -->
            <img src="assets/img/balita.webp" alt="Ilustrasi" />
          </div>
        </div>
        <div class="col-md-6 form-side">
          <h2 class="fw-bold mb-4">Register</h2>
          <form id="formRegister">
            <div class="mb-3">
              <label class="form-label fw-bold">Username Baru</label>
              <input
                type="text"
                id="regUsername"
                class="form-control"
                placeholder="Buat Username"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Password</label>
              <input
                type="password"
                id="regPassword"
                class="form-control"
                placeholder="Buat Password"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Konfirmasi Password</label>
              <input
                type="password"
                id="confirmPassword"
                class="form-control"
                placeholder="Ulangi Password"
                required
              />
            </div>
            <button type="submit" class="btn btn-register w-100">
              Daftar Sekarang
            </button>
            <div class="text-center mt-3">
              <small class="text-muted"
                >Sudah punya akun?
                <a href="/" class="text-decoration-none"
                  >Login di sini</a
                ></small
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("formRegister")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const username = document.getElementById("regUsername").value;
          const password = document.getElementById("regPassword").value;
          const confirm = document.getElementById("confirmPassword").value;

          if (password !== confirm) {
            return alert("Password konfirmasi tidak cocok!");
          }

          try {
            const response = await fetch("/api/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });
            const result = await response.json();

            if (response.ok) {
              alert(result.message);
              window.location.href = "/";
            } else {
              alert(result.message);
            }
          } catch (error) {
            alert("Gagal melakukan registrasi.");
          }
        });
    </script>
  </body>
</html>
